# Edge gateway: routes by Host (subdomain) to the right container.
# Cloudflare -> this gateway. Listens on 80 and 443 (origin cert) -> use CF SSL "Full".
# Cert files are mounted at /etc/nginx/certs (NOT committed to git).

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

ssl_certificate     /etc/nginx/certs/fullchain.pem;
ssl_certificate_key /etc/nginx/certs/privkey.pem;
ssl_protocols TLSv1.2 TLSv1.3;

# User app -> app.trello-clone.online
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name app.trello-clone.online;
    client_max_body_size 50m;
    location / {
        proxy_pass http://frontend-user:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Admin app -> admin.trello-clone.online
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name admin.trello-clone.online;
    client_max_body_size 50m;
    location / {
        proxy_pass http://frontend-admin:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# MinIO (media) -> media.trello-clone.online. Host preserved so presigned signatures match.
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name media.trello-clone.online;
    client_max_body_size 200m;
    location / {
        proxy_pass http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 300;
        proxy_request_buffering off;
    }
}

# Bot webhook (DNS-only, bypasses Cloudflare) -> bot.trello-clone.online
server {
    listen 80;
    server_name bot.trello-clone.online;
    location /.well-known/acme-challenge/ { root /var/www/certbot; default_type "text/plain"; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    http2 on;
    server_name bot.trello-clone.online;
    ssl_certificate     /etc/letsencrypt/live/bot.trello-clone.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.trello-clone.online/privkey.pem;
    client_max_body_size 10m;
    location /api/ {
        proxy_pass http://api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location / { return 404; }
}

# Internal observability (Grafana) -> internal.trello-clone.online
# Wildcard cert covers it. Grafana's own login gates access. Add Cloudflare
# Access / IP allowlist in front for stricter control if needed.
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name internal.trello-clone.online;
    client_max_body_size 50m;
    location / {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Landing (root) + default
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    http2 on;
    server_name trello-clone.online www.trello-clone.online _;
    client_max_body_size 50m;
    location /.well-known/acme-challenge/ { root /var/www/certbot; default_type "text/plain"; }
    location / {
        proxy_pass http://landing:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
