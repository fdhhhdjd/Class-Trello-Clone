# Observability overlay. Run together with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# Same project name -> shares the `backend` network with api/postgres/redis.
# Grafana is bound to 127.0.0.1 only; reach it via the gateway subdomain (dev) or
# an SSH tunnel. Never expose Grafana/Prometheus directly to the Internet.

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: trello-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks: [backend]
    depends_on: [alertmanager]

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: trello-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - amdata:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks: [backend]

  grafana:
    image: grafana/grafana:11.1.0
    container_name: trello-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?set GRAFANA_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://internal.trello-clone.online}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    networks: [backend]
    depends_on: [prometheus]

  node_exporter:
    image: prom/node-exporter:v1.8.1
    container_name: trello-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks: [backend]

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: trello-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-trello}:${POSTGRES_PASSWORD:-trello}@postgres:5432/${POSTGRES_DB:-trello}?sslmode=disable"
    networks: [backend]

  redis_exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: trello-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    networks: [backend]

  loki:
    image: grafana/loki:3.1.0
    container_name: trello-loki
    restart: unless-stopped
    command: ['-config.file=/etc/loki/config.yml']
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - lokidata:/loki
    networks: [backend]

  promtail:
    image: grafana/promtail:3.1.0
    container_name: trello-promtail
    restart: unless-stopped
    command: ['-config.file=/etc/promtail/config.yml']
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [backend]
    depends_on: [loki]

  tempo:
    image: grafana/tempo:2.5.0
    container_name: trello-tempo
    restart: unless-stopped
    command: ['-config.file=/etc/tempo/tempo.yml']
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempodata:/var/tempo
    networks: [backend]

volumes:
  promdata:
  amdata:
  grafanadata:
  lokidata:
  tempodata:
