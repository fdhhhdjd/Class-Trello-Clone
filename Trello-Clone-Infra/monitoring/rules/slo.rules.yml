# SLO: API availability 99.9% (error budget = 0.1%). Multi-window burn-rate alerts
# per Google SRE: fast burn pages, slow burn tickets. 5xx = "bad" event.
groups:
  - name: slo_burn_rate
    interval: 30s
    rules:
      - record: job:slo_error_ratio:rate5m
        expr: |
          sum(rate(http_requests_total{job="trello_api",status_code=~"5.."}[5m]))
          / sum(rate(http_requests_total{job="trello_api"}[5m]))
      - record: job:slo_error_ratio:rate30m
        expr: |
          sum(rate(http_requests_total{job="trello_api",status_code=~"5.."}[30m]))
          / sum(rate(http_requests_total{job="trello_api"}[30m]))
      - record: job:slo_error_ratio:rate1h
        expr: |
          sum(rate(http_requests_total{job="trello_api",status_code=~"5.."}[1h]))
          / sum(rate(http_requests_total{job="trello_api"}[1h]))
      - record: job:slo_error_ratio:rate6h
        expr: |
          sum(rate(http_requests_total{job="trello_api",status_code=~"5.."}[6h]))
          / sum(rate(http_requests_total{job="trello_api"}[6h]))

  - name: slo_alerts
    rules:
      # Fast burn: 14.4x budget -> 2% of monthly budget in 1h. PAGE.
      - alert: ApiErrorBudgetFastBurn
        expr: |
          job:slo_error_ratio:rate1h > (14.4 * 0.001)
          and job:slo_error_ratio:rate5m > (14.4 * 0.001)
        for: 2m
        labels: { severity: critical, service: trello-api }
        annotations:
          summary: "API đốt error budget 14.4x (fast burn)"
          description: "5xx ratio 1h={{ $value | humanizePercentage }} — sự cố lớn, vào điều tra ngay."
          runbook: "https://runbooks.trello-clone.online/api-fast-burn"

      # Slow burn: 6x budget -> ~5% in 6h. TICKET.
      - alert: ApiErrorBudgetSlowBurn
        expr: |
          job:slo_error_ratio:rate6h > (6 * 0.001)
          and job:slo_error_ratio:rate30m > (6 * 0.001)
        for: 15m
        labels: { severity: warning, service: trello-api }
        annotations:
          summary: "API đốt error budget 6x (slow burn)"
          description: "5xx ratio 6h={{ $value | humanizePercentage }} — rò rỉ chậm, tạo ticket xử lý."
          runbook: "https://runbooks.trello-clone.online/api-slow-burn"

  - name: latency_alerts
    rules:
      # SLO phụ: p95 < 500ms.
      - alert: ApiLatencyP95High
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="trello_api"}[5m])) by (le)
          ) > 0.5
        for: 10m
        labels: { severity: warning, service: trello-api }
        annotations:
          summary: "API p95 latency > 500ms"
          description: "p95={{ $value }}s trong 10m."

      - alert: ApiDown
        expr: up{job="trello_api"} == 0
        for: 1m
        labels: { severity: critical, service: trello-api }
        annotations:
          summary: "API target DOWN"
          description: "Prometheus không scrape được api:4000/metrics."
