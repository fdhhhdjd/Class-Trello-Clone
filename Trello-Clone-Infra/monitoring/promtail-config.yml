# Ships Docker container stdout/stderr to Loki. Parses the JSON pino logs from the
# api container so level/trace_id become queryable labels/fields in Grafana.
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
    pipeline_stages:
      # api logs are JSON (pino) — extract level + trace_id for filtering.
      - match:
          selector: '{container="trello-api-1"}'
          stages:
            - json:
                expressions:
                  level: level
                  trace_id: trace_id
            - labels:
                level:
