# Telegram alerting. Fill the two placeholders on the server (file is mounted ro):
#   sed -i "s/__TELEGRAM_BOT_TOKEN__/<token>/; s/__TELEGRAM_CHAT_ID__/<chat_id>/" monitoring/alertmanager.yml
# chat_id must be a bare integer (no quotes). Get it from @userinfobot / getUpdates.
# Use a SEPARATE bot for dev vs prod so dev noise never drowns prod pages.
route:
  receiver: telegram
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: ['severity = critical']
      receiver: telegram
      repeat_interval: 1h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: '__TELEGRAM_BOT_TOKEN__'
        chat_id: __TELEGRAM_CHAT_ID__
        parse_mode: HTML
        send_resolved: true
        message: |
          {{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} <b>[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}</b>
          {{ range .Alerts }}
          📌 {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ if .Annotations.runbook }}📖 {{ .Annotations.runbook }}{{ end }}
          {{ end }}

inhibit_rules:
  - source_matchers: ['severity = critical']
    target_matchers: ['severity = warning']
    equal: ['alertname', 'service']
