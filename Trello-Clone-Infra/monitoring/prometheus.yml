global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: trello_api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:4000']

  - job_name: node
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: postgres
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis_exporter:9121']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
